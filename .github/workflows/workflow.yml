name: Build and publish

on:
  push:
    branches: [develop]
  release:
    types: [published]

# Serialize runs per-ref so two develop merges can't race on the beta bump.
concurrency:
  group: publish-${{ github.ref }}
  cancel-in-progress: false

jobs:
  build:
    name: Build distribution
    runs-on: ubuntu-latest
    permissions:
      contents: read  # push-back uses the deploy key, not GITHUB_TOKEN
    steps:
      - uses: actions/checkout@v4
        with:
          # Deploy keys bypass develop's required-checks ruleset; GITHUB_TOKEN can't push.
          ssh-key: ${{ secrets.DEVELOP_DEPLOY_KEY }}
          # fetch-depth 0 so we can reset to the develop tip before bumping.
          fetch-depth: 0

      - name: Install uv
        uses: astral-sh/setup-uv@v4
        with:
          version: "latest"

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.13"

      - name: Auto-bump beta version and commit to develop
        if: github.event_name == 'push' && github.ref == 'refs/heads/develop'
        run: |
          set -euo pipefail
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          # Reset to the latest develop tip so serialized runs bump in sequence.
          git fetch origin develop
          git checkout -B develop origin/develop
          NEW="$(python scripts/bump_beta.py)"
          echo "Bumped beta version to $NEW"
          git add src/aqua/__init__.py
          # [skip ci] stops the bump commit from re-triggering this workflow
          # (deploy-key pushes DO re-trigger workflows, unlike GITHUB_TOKEN).
          git commit -m "chore: bump beta to $NEW [skip ci]"
          git push origin HEAD:develop

      - name: Build sdist and wheel
        run: uv build

      - name: Upload distribution artifacts
        uses: actions/upload-artifact@v4
        with:
          name: python-package-distributions
          path: dist/

  publish-to-testpypi:
    name: Publish to TestPyPI
    if: github.event_name == 'push' && github.ref == 'refs/heads/develop'
    needs: [build]
    runs-on: ubuntu-latest
    environment:
      name: testpypi
      url: https://test.pypi.org/p/agentic-aqua
    permissions:
      id-token: write
    steps:
      - name: Download distribution artifacts
        uses: actions/download-artifact@v4
        with:
          name: python-package-distributions
          path: dist/

      - name: Publish to TestPyPI
        uses: pypa/gh-action-pypi-publish@release/v1
        with:
          repository-url: https://test.pypi.org/legacy/
          skip-existing: true

  publish-to-pypi:
    name: Publish to PyPI
    if: github.event_name == 'release' && github.event.action == 'published'
    needs: [build]
    runs-on: ubuntu-latest
    environment:
      name: pypi
      url: https://pypi.org/p/agentic-aqua
    permissions:
      id-token: write
    steps:
      - name: Download distribution artifacts
        uses: actions/download-artifact@v4
        with:
          name: python-package-distributions
          path: dist/

      - name: Publish to PyPI
        uses: pypa/gh-action-pypi-publish@release/v1
